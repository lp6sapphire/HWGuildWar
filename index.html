<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guild War Planner</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f0;--tx:#1a1a1a;--tx2:#666;--tx3:#999;
  --bd:#ddd;--win:#0F6E56;--winbg:rgba(29,158,117,.1);
  --lose:#A32D2D;--losebg:rgba(226,75,74,.08);
  --warn:#854F0B;--warnbg:rgba(186,117,23,.12);
  --acc:#2563eb;--mono:Consolas,monospace
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#252525;--tx:#e0e0e0;--tx2:#aaa;--tx3:#777;--bd:#444}
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;color:var(--tx);background:var(--bg);
  padding:12px;max-width:1200px;margin:0 auto;font-size:13px}
.btn{padding:5px 12px;font-size:11px;border:1px solid var(--bd);border-radius:5px;
  cursor:pointer;background:var(--bg);color:var(--tx);font-family:inherit}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-p{background:var(--win)!important;color:#fff!important;border-color:var(--win)!important;font-weight:600}
.btn-p:hover{opacity:.9}
.btn-d{color:var(--lose);border-color:var(--lose)}
.btn-big{padding:10px 20px;font-size:13px;width:100%;margin-top:10px;border-radius:6px}
input{font-size:11px;padding:3px 5px;border:1px solid var(--bd);border-radius:4px;
  background:var(--bg);color:var(--tx);font-family:inherit;box-sizing:border-box}
select{font-size:11px;padding:2px 4px;border:1px solid var(--bd);border-radius:4px;
  background:var(--bg);color:var(--tx);font-family:inherit;width:100%}
table{width:100%;border-collapse:collapse;font-size:11px}
th{font-size:10px;color:var(--tx3);font-weight:400;padding:3px 4px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:2px 4px;border-bottom:1px solid var(--bd);vertical-align:middle}
.card{background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:6px}
.card.cap{border:1.5px solid var(--win)}
.card.fail{border:1.5px solid var(--lose)}
.card.part{border:1.5px solid var(--warn)}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;
  background:var(--winbg);color:var(--win);font-weight:600}
.sbar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bd);
  padding:6px 0;margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sm{text-align:center;min-width:68px}
.sm small{font-size:10px;color:var(--tx2);display:block}
.sm b{font-size:18px;font-weight:500}
.sdiv{border-left:1px solid var(--bd);padding-left:8px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:12px}
.tab{padding:7px 16px;font-size:12px;cursor:pointer;border:none;background:none;
  color:var(--tx2);border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:var(--tx);font-weight:600;border-bottom-color:var(--win)}
.bgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tlbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;
  font-weight:600;margin:14px 0 5px}
.pill{display:inline-block;padding:0 6px;border-radius:10px;font-size:10px;line-height:1.8;font-weight:600}
.pw{background:var(--winbg);color:var(--win)}
.pl{background:var(--losebg);color:var(--lose)}
.pe{background:rgba(128,128,128,.1);color:#888}
.cbox{font-family:var(--mono);font-size:10px;padding:8px;background:var(--bg2);
  border-radius:6px;margin-top:8px;white-space:pre-wrap;user-select:all;line-height:1.7}
.num{text-align:right;width:100%}
/* Tier layouts */
.bgrid-t1{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.bgrid-t2{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bgrid-t3{display:grid;grid-template-columns:1fr;gap:6px}
.card-citadel{background:var(--bg2);border-radius:8px;padding:10px;
  width:calc(50% - 3px);border:1px solid rgba(37,99,235,.25)}
.card-citadel table{width:100%}
/* Citadel inner grid: 2 columns of slots */
.citadel-slots{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.tlbl-t1{color:var(--tx3)}
.tlbl-t2{color:#b06000}
.tlbl-t3{color:var(--acc)}
#fileInput{display:none}
</style>
</head>
<body>

<!-- header -->
<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
  <b style="font-size:16px">⚔️ Guild War Planner</b>
  <span style="flex:1"></span>
  <span style="font-size:11px;color:var(--tx3)">👻 Ghost Bridge: <b style="color:var(--warn)">always active</b></span>
  <label style="font-size:11px;display:flex;align-items:center;gap:4px">
    Pts per fight win:
    <input type="number" id="fptInp" value="20" min="1" max="999" style="width:44px"
      onchange="fightPts=parseInt(this.value)||10;saveLS();renderScore()">
  </label>
  <label style="font-size:11px;display:flex;align-items:center;gap:4px" title="E5 titan attack advantage %">
    ⚡ E5 boost:
    <input type="number" id="boostInp" value="10" min="0" max="50" style="width:36px"
      onchange="titanBoost=parseInt(this.value)||0;saveLS()">%
  </label>
  <label style="font-size:11px;display:flex;align-items:center;gap:4px" title="Non-E5 titan attack penalty %">
    ⚡ non-E5 penalty:
    <input type="number" id="penaltyInp" value="10" min="0" max="50" style="width:36px"
      onchange="titanPenalty=parseInt(this.value)||0;saveLS()">%
  </label>
  <button class="btn" onclick="doExport()">💾 Export</button>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📂 Import</button>
  <button class="btn btn-d" style="font-size:10px;padding:3px 8px" onclick="resetWar()">🗑 Reset war</button>
  <input type="file" id="fileInput" accept=".json" onchange="doImport(event)">
</div>

<!-- score bar -->
<div class="sbar" id="scoreBar"></div>

<!-- roster -->
<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
  <b style="font-size:14px">Roster</b>
  <button class="btn" style="font-size:11px" onclick="addPlayer()" id="addBtn">+ Player</button>
  <button class="btn" style="font-size:11px" onclick="sortRoster('max');renderAll()">↕ Overall</button>
  <button class="btn" style="font-size:11px" onclick="sortRoster('h');renderAll()">↕ ⚔️ Heroes</button>
  <button class="btn" style="font-size:11px" onclick="sortRoster('t');renderAll()">↕ ⚡ Titans</button>
  <button class="btn btn-d" style="font-size:10px;padding:3px 8px" onclick="clearPowers()">🗑 Clear powers</button>
  <span style="font-size:10px;color:var(--tx3)">🛡 = defending this war</span>
</div>
<div id="rosterWrap" style="margin-bottom:10px"></div>

<!-- action buttons -->
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
  <button id="defBtn" class="btn btn-p" style="flex:1;min-width:180px;padding:9px" onclick="autoDefense()">🛡 Auto-distribute defense</button>
  <button id="atkBtn" class="btn btn-p" style="flex:1;min-width:180px;padding:9px" onclick="runCalc()">⚔️ Calculate attack plan</button>
</div>

<!-- tabs -->
<div class="tabs">
  <button class="tab on" id="tab0" onclick="setTab(0)">🛡 Our Defense</button>
  <button class="tab"    id="tab1" onclick="setTab(1)">🗡 Enemy Defense</button>
  <button class="tab"    id="tab2" onclick="setTab(2)">📊 Attack Plan</button>
</div>
<div id="tabContent"></div>

<script>
// ═══════════════════════════════════════════════
// BUILDINGS
// ═══════════════════════════════════════════════
const BLDGS = [
  {id:'bridge',    name:'Bridge',            ru:'Мост',            tier:1, slots:4, type:'titans', bonus:60},
  {id:'barracks',  name:'Barracks',          ru:'Казармы',         tier:1, slots:3, type:'heroes', bonus:40},
  {id:'lighthouse',name:'Lighthouse',        ru:'Маяк',            tier:1, slots:3, type:'heroes', bonus:40},
  {id:'mage',      name:'Mage Academy',      ru:'Акад. Магов',     tier:1, slots:3, type:'heroes', bonus:40},
  {id:'foundry',   name:'Foundry',           ru:'Литейная',        tier:2, slots:4, type:'heroes', bonus:60},
  {id:'fire',      name:'Bastion of Fire',   ru:'Бастион Огня',    tier:2, slots:4, type:'titans', bonus:60},
  {id:'nature',    name:'Gates of Nature',   ru:'Врата Природы',   tier:2, slots:4, type:'titans', bonus:60},
  {id:'ice',       name:'Bastion of Ice',    ru:'Бастион Льда',    tier:2, slots:4, type:'titans', bonus:60},
  {id:'spring',    name:'Spring of Elem.',   ru:'Ист. Стихий',     tier:2, slots:4, type:'titans', bonus:60},
  {id:'citadel',   name:'Citadel',           ru:'Цитадель',        tier:3, slots:7, type:'heroes', bonus:120},
];
// Defense order: bonus desc, then tier asc (T1 before T2 at same bonus)
const DEF_ORDER = [...BLDGS].sort((a,b) => b.bonus - a.bonus || a.tier - b.tier);
const T3P = ['fire','nature','ice','spring'];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
// roster: [{id, name, hPow, tPow}]
// ourDef: buildingId → ["h_<id>" | "t_<id>" | null, ...]
// enmDef: buildingId → [{name, power}, ...]
let roster = [];
let ourDef  = {};
let enmDef  = {};
let atkPlan = null;
let atkPlayerPlan = null; // playerId → [{bid, si, team, result, gamble, myPow, defPow}]
let ghostBridge = true; // always active
let fightPts = 20;
let titanBoost = 10; // % E5 titan attack advantage
let titanPenalty = 10; // % non-E5 titan attack penalty
let nextId = 1;
let activeTab = 0;

BLDGS.forEach(b => {
  ourDef[b.id] = Array(b.slots).fill(null);
  enmDef[b.id] = Array.from({length: b.slots}, () => ({name:'', power:0}));
});

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Parse a slot id like "h_5" or "t_5"
function slotInfo(sid) {
  if (!sid) return null;
  const [type, idStr] = sid.split('_');
  const id = parseInt(idStr);
  const p  = roster.find(r => r.id === id);
  if (!p) return null;
  return {
    sid,
    playerName: p.name,
    power: type === 'h' ? p.hPow : p.tPow,
    type:  type === 'h' ? 'heroes' : 'titans',
  };
}

// All hero slot-ids sorted strongest first
function heroSlots()  {
  return roster
    .filter(r => r.hPow > 0)
    .sort((a,b) => b.hPow - a.hPow)
    .map(r => 'h_'+r.id);
}
function titanSlots() {
  return roster
    .filter(r => r.tPow > 0)
    .sort((a,b) => b.tPow - a.tPow)
    .map(r => 't_'+r.id);
}

// Set of all slot-ids currently assigned to defense
function defSet() {
  const s = new Set();
  BLDGS.forEach(b => ourDef[b.id].forEach(d => { if (d) s.add(d); }));
  return s;
}

// ═══════════════════════════════════════════════
// ROSTER OPS
// ═══════════════════════════════════════════════
function addPlayer() {
  if (roster.length >= 20) { alert('Maximum 20 players.'); return; }
  roster.push({id: nextId++, name:'', hPow:0, tPow:0, e5:true, risk:false});
  renderAll();
}
function removePlayer(i) {
  const id = roster[i].id;
  BLDGS.forEach(b => {
    ourDef[b.id] = ourDef[b.id].map(d => (d==='h_'+id || d==='t_'+id) ? null : d);
  });
  roster.splice(i, 1);
  renderAll();
}
function sortRoster(by='max') {
  roster.sort((a,b) => {
    if (by==='h') return b.hPow - a.hPow;
    if (by==='t') return b.tPow - a.tPow;
    return Math.max(b.hPow,b.tPow) - Math.max(a.hPow,a.tPow);
  });
}
function clearPowers() {
  if (!confirm('Clear all power values?')) return;
  roster.forEach(p => { p.hPow = 0; p.tPow = 0; });
  renderAll();
}

// ═══════════════════════════════════════════════
// AUTO-DEFENSE
// Round-robin: fill slot[0] of every building first (strongest players),
// then slot[1], etc. — every building gets a strong defender before
// any building gets its 2nd slot. Buildings sorted: +60 first, T1 before T2.
// ═══════════════════════════════════════════════
function autoDefense() {
  BLDGS.forEach(b => { ourDef[b.id] = Array(b.slots).fill(null); });

  const hPool = heroSlots();  // strongest first
  const tPool = titanSlots();
  const hUsed = new Set(), tUsed = new Set();

  const hBldgs = DEF_ORDER.filter(b => b.type === 'heroes');
  const tBldgs = DEF_ORDER.filter(b => b.type === 'titans');

  function fillRoundRobin(bldgList, pool, used) {
    const maxSlots = Math.max(...bldgList.map(b => b.slots));
    for (let slot = 0; slot < maxSlots; slot++) {
      for (const b of bldgList) {
        if (slot >= b.slots) continue;
        const cand = pool.find(s => !used.has(s));
        if (!cand) return;
        ourDef[b.id][slot] = cand;
        used.add(cand);
      }
    }
  }

  fillRoundRobin(hBldgs, hPool, hUsed);
  fillRoundRobin(tBldgs, tPool, tUsed);
  renderAll();
}

// ═══════════════════════════════════════════════
// ATTACK OPTIMIZER
// Rules:
//   - Each player gets 2 attack attempts (total, any team mix)
//   - Hero team attacks hero buildings, titan team attacks titan buildings
//   - If h_id on defense → can't use hero team to attack
//   - If t_id on defense → can't use titan team to attack
//   - E5 titan: effective attack power boosted by titanBoost%  (gamble mode)
//   - non-E5 titan: no boost, flagged risky
//   - Risk player: still assigned but shown as 50/50, excluded from full-capture calc
// ═══════════════════════════════════════════════
function calcAtk() {
  const ds = defSet();

  // Per-player attack budget: max 2 total
  const PAC = {}; // playerId → attacks used
  roster.forEach(p => PAC[p.id] = 0);

  // Can this player attack with this team type?
  function canAtk(p, type) {
    if (PAC[p.id] >= 2) return false;
    if (type === 'h') return !ds.has('h_'+p.id) && p.hPow > 0;
    return !ds.has('t_'+p.id) && p.tPow > 0;
  }

  // Effective attack power: E5 boost, non-E5 penalty, heroes unchanged
  function atkPow(p, type, gamble) {
    if (type === 'h') return p.hPow;
    if (p.e5 !== false) {
      // E5 titan: boost in gamble mode, base power otherwise
      return gamble ? Math.round(p.tPow * (1 + titanBoost / 100)) : p.tPow;
    } else {
      // non-E5 titan: always penalized regardless of gamble
      return Math.round(p.tPow * (1 - titanPenalty / 100));
    }
  }

  const plan = {};
  const pp = {}; // atkPlayerPlan: playerId → [{bid,si,team,result,gamble,myPow,defPow,e5}]
  roster.forEach(p => { pp[p.id] = []; });
  BLDGS.forEach(b => plan[b.id] = {slots:[], captured:false, bonus:0, locked:true});

  function unlockable(id) {
    const b = BLDGS.find(x => x.id === id);
    if (b.tier === 1) return true;
    if (b.tier === 2) return plan['bridge']?.captured || ghostBridge;
    if (b.tier === 3) return T3P.some(pid => plan[pid]?.captured);
    return false;
  }

  // Try to assign attacks for a building
  function assign(b) {
    const type = b.type === 'titans' ? 't' : 'h';
    const defs = enmDef[b.id].map((s,i) => ({...s,i})).filter(s => s.power>0||s.name.trim());
    if (!defs.length) return;

    // Candidates: sorted weakest first (save strong for harder slots)
    const cands = (gamble, tmpPAC) => roster.filter(p => {
      if (!canAtk(p, type)) return false;
      if ((PAC[p.id] + (tmpPAC[p.id]||0)) >= 2) return false;
      if (gamble && (type !== 't' || p.e5 === false)) return false; // gamble only for E5 titans
      return true;
    }).sort((a,x) => atkPow(a,type,gamble) - atkPow(x,type,gamble));

    // --- Pass 1: try full capture (safe) ---
    // Skip risk players in full-capture calculation
    const tryFull = (gamble) => {
      const sortedHard = [...defs].sort((a,x) => x.power - a.power);
      const tmp = [], tmpPAC = {};
      for (const def of sortedHard) {
        const pool = cands(gamble, tmpPAC).filter(p => {
          if (p.risk) return false;
          return atkPow(p, type, gamble) > def.power;
        });
        if (!pool.length) return null;
        const winner = pool[0];
        tmp.push({defIdx:def.i, pid:winner.id, result:gamble?'gamble':'win', gamble, myPow:atkPow(winner,type,gamble), defPow:def.power, e5:winner.e5!==false});
        tmpPAC[winner.id] = (tmpPAC[winner.id]||0) + 1;
      }
      return tmp;
    };

    const fullSafe   = tryFull(false);
    const fullGamble = tryFull(true);
    const fullResult = fullSafe || fullGamble;

    if (fullResult) {
      fullResult.forEach(m => {
        PAC[m.pid]++;
        pp[m.pid].push({bid:b.id, si:m.defIdx, team:type, result:m.result, gamble:m.gamble, myPow:m.myPow, defPow:m.defPow, e5:m.e5});
        plan[b.id].slots.push({defIdx:m.defIdx, pid:m.pid, team:type, result:m.result, gamble:m.gamble});
      });
      plan[b.id].captured = true;
      plan[b.id].bonus = b.bonus;
      return;
    }

    // --- Pass 2: partial — win as many as possible (easy first) ---
    const tmpPAC2 = {};
    [...defs].sort((a,x) => a.power - x.power).forEach(def => {
      for (const gamble of [false, true]) {
        const pool = cands(gamble, tmpPAC2).filter(p => atkPow(p, type, gamble) > def.power);
        if (pool.length) {
          const winner = pool[0];
          PAC[winner.id]++;
          tmpPAC2[winner.id] = (tmpPAC2[winner.id]||0) + 1;
          pp[winner.id].push({bid:b.id, si:def.i, team:type, result:gamble?'gamble':'win', gamble, myPow:atkPow(winner,type,gamble), defPow:def.power, e5:winner.e5!==false});
          plan[b.id].slots.push({defIdx:def.i, pid:winner.id, team:type, result:gamble?'gamble':'win', gamble});
          return;
        }
      }
      plan[b.id].slots.push({defIdx:def.i, pid:null, team:type, result:'none'});
    });
  }

  // Priority: high bonus first, then tier
  const ordered = [...BLDGS].sort((a,b) => b.bonus - a.bonus || a.tier - b.tier);

  for (let pass = 0; pass < 3; pass++) {
    for (const b of ordered) {
      if (unlockable(b.id)) {
        plan[b.id].locked = false;
        if (!plan[b.id].slots.length) assign(b);
      }
    }
  }

  atkPlan = plan;
  atkPlayerPlan = pp;
}

// ═══════════════════════════════════════════════
// SCORE
// ═══════════════════════════════════════════════
function getScore() {
  if (!atkPlan) return {wins:0, gambWins:0, bonus:0, total:0, caps:0};
  let wins=0, gambWins=0, bonus=0, caps=0;
  BLDGS.forEach(b => {
    const p = atkPlan[b.id];
    if (!p || p.locked) return;
    wins     += p.slots.filter(s => s.result==='win').length;
    gambWins += p.slots.filter(s => s.result==='gamble').length;
    bonus    += p.bonus;
    if (p.captured) caps++;
  });
  const totalWins = wins + gambWins;
  return {wins, gambWins, totalWins, bonus, total: totalWins*fightPts+bonus, caps};
}

// ═══════════════════════════════════════════════
// RENDER — SCORE BAR
// ═══════════════════════════════════════════════
function renderScore() {
  const sc = getScore();
  const ds = defSet();
  const fH = roster.filter(r => !ds.has('h_'+r.id) && r.hPow > 0).length;
  const fT = roster.filter(r => !ds.has('t_'+r.id) && r.tPow > 0).length;
  const gambNote = sc.gambWins > 0 ? ` <span style="color:var(--warn);font-size:11px">(+${sc.gambWins}🎲)</span>` : '';
  document.getElementById('scoreBar').innerHTML =
    `<div class="sm"><small>Safe wins</small><b style="color:var(--win)">${sc.wins}${gambNote}</b></div>
     <div class="sm"><small>×${fightPts} pts</small><b>${sc.totalWins*fightPts}</b></div>
     <div class="sm sdiv"><small>Bonus</small><b style="color:var(--acc)">${sc.bonus}</b></div>
     <div class="sm sdiv"><small>TOTAL</small><b style="font-size:20px;color:var(--win)">${sc.total}</b></div>
     <div class="sm sdiv"><small>Captures</small><b style="color:var(--acc)">${sc.caps}/${BLDGS.length}</b></div>
     <div class="sm sdiv"><small>Free ⚔️/⚡</small><b style="color:var(--tx2)">${fH}/${fT}</b></div>`;
}

// ═══════════════════════════════════════════════
// RENDER — ROSTER
// ═══════════════════════════════════════════════
// Flat list of all enemy slots in render order: [{bid, si}, ...]
function enmSlots() {
  const slots = [];
  BLDGS.forEach(b => {
    for (let si = 0; si < b.slots; si++) slots.push({bid: b.id, si});
  });
  return slots;
}

// Enter on enemy name: name[0] → name[1] → ... across all buildings
function enmNameEnter(e, bid, si) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  enmDef[bid][si].name = e.target.value;
  saveLS();
  const slots = enmSlots();
  const cur = slots.findIndex(s => s.bid === bid && s.si === si);
  const next = slots[cur + 1];
  if (next) {
    const el = document.getElementById(`en_${next.bid}_${next.si}_n`);
    if (el) { el.focus(); el.select(); }
  }
}

// Enter on enemy power: power[0] → power[1] → ... across all buildings
function enmPowEnter(e, bid, si) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  enmDef[bid][si].power = parseFloat(e.target.value) || 0;
  saveLS(); updateButtons();
  const slots = enmSlots();
  const cur = slots.findIndex(s => s.bid === bid && s.si === si);
  const next = slots[cur + 1];
  if (next) {
    const el = document.getElementById(`en_${next.bid}_${next.si}_p`);
    if (el) { el.focus(); el.select(); }
  }
}

// Powers stored and displayed in K (e.g. 450 = 450K)
function normPow(v) { return parseFloat(v) || 0; }

function rosterNameEnter(e, i) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  roster[i].name = e.target.value;
  saveLS();
  const ni = i + 1;
  if (ni >= roster.length && ni < 20) addPlayer();
  const next = document.getElementById(`rn_${ni}`);
  if (next) { next.focus(); next.select(); }
}

// Enter on power: hPow[i] → tPow[i] → hPow[i+1] → tPow[i+1] → ...
function rosterPowEnter(e, i, field) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  if (field === 'h') roster[i].hPow = parseFloat(e.target.value) || 0;
  else               roster[i].tPow = parseFloat(e.target.value) || 0;
  saveLS();
  let ni = i, nf = field;
  if (field === 'h') { nf = 't'; }
  else               { nf = 'h'; ni = i + 1; }
  if (ni >= roster.length && ni < 20) addPlayer();
  const next = document.getElementById(`rp_${ni}_${nf}`);
  if (next) { next.focus(); next.select(); }
}

function renderRoster() {
  const btn = document.getElementById('addBtn');
  if (btn) btn.textContent = `+ Player (${roster.length}/20)`;
  const wrap = document.getElementById('rosterWrap');
  if (!roster.length) {
    wrap.innerHTML = '<div style="color:var(--tx3);font-size:11px">No players yet. Click "+ Player".</div>';
    return;
  }
  const ds = defSet();
  // Split into 2 columns
  const half = Math.ceil(roster.length / 2);
  const mkTable = (from, to) => {
    if (from >= roster.length) return '';
    let h = `<table><thead><tr>
      <th style="width:18px">#</th>
      <th>Player</th>
      <th style="width:68px;text-align:right">⚔️ Heroes (K)</th>
      <th style="width:68px;text-align:right">⚡ Titans (K)</th>
      <th style="width:30px;text-align:center" title="Titan team is E5">E5</th>
      <th style="width:34px;text-align:center" title="Risky player (for attack planning)">Risk</th>
      <th style="width:60px;text-align:center">Defense</th>
      <th style="width:18px"></th>
    </tr></thead><tbody>`;
    for (let i = from; i < Math.min(to, roster.length); i++) {
      const p    = roster[i];
      const hDef = ds.has('h_'+p.id);
      const tDef = ds.has('t_'+p.id);
      const defTxt = hDef && tDef ? '⚔️⚡🛡'
        : hDef ? '⚔️🛡 ⚡free'
        : tDef ? '⚡🛡 ⚔️free'
        : '— free';
      h += `<tr>
        <td style="color:var(--tx3)">${i+1}</td>
        <td><input type="text" id="rn_${i}" value="${esc(p.name)}" placeholder="player name"
          style="width:100%;font-size:10px;padding:1px 3px"
          onchange="roster[${i}].name=this.value;saveLS();renderRoster();renderTab(activeTab)"
          onkeydown="rosterNameEnter(event,${i})"></td>
        <td><input type="text" inputmode="decimal" value="${p.hPow||0}" class="num"
          id="rp_${i}_h" style="font-size:10px;padding:1px 4px"
          onfocus="if(this.value==='0')this.value=''"
          onblur="if(!this.value||isNaN(+this.value))this.value='0'"
          onchange="roster[${i}].hPow=parseFloat(this.value)||0;saveLS()"
          onkeydown="rosterPowEnter(event,${i},'h')"></td>
        <td><input type="text" inputmode="decimal" value="${p.tPow||0}" class="num"
          id="rp_${i}_t" style="font-size:10px;padding:1px 4px"
          onfocus="if(this.value==='0')this.value=''"
          onblur="if(!this.value||isNaN(+this.value))this.value='0'"
          onchange="roster[${i}].tPow=parseFloat(this.value)||0;saveLS()"
          onkeydown="rosterPowEnter(event,${i},'t')"></td>
        <td style="text-align:center">
          <input type="checkbox" ${p.e5!==false?'checked':''} title="E5 titans"
            onchange="roster[${i}].e5=this.checked;saveLS();renderRoster()"></td>
        <td style="text-align:center">
          <input type="checkbox" ${p.risk?'checked':''} title="Risk player"
            onchange="roster[${i}].risk=this.checked;saveLS();renderRoster()"></td>
        <td style="text-align:center;font-size:9px;color:var(--tx3);white-space:nowrap">${defTxt}</td>
        <td><button class="btn btn-d" style="padding:0 3px;font-size:8px;line-height:1.6"
          onclick="removePlayer(${i})">×</button></td>
      </tr>`;
    }
    return h + `</tbody></table>`;
  };
  wrap.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
    ${mkTable(0, half)}${mkTable(half, roster.length)}
  </div>`;
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function setTab(n) {
  activeTab = n;
  [0,1,2].forEach(i => document.getElementById('tab'+i).classList.toggle('on', i===n));
  renderTab(n);
}
function renderTab(n) {
  if (n===0) renderOurDef();
  else if (n===1) renderEnmDef();
  else renderResults();
}

// ═══════════════════════════════════════════════
// TAB 0 — OUR DEFENSE
// ═══════════════════════════════════════════════
function bldgCard(b, slotsHtml, filled) {
  const isT = b.type === 'titans';
  const bonusColor = b.bonus >= 120 ? 'var(--acc)' : b.bonus >= 60 ? 'var(--warn)' : 'var(--tx2)';
  return `<div class="card">
    <div style="margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:4px">
        <b style="font-size:12px">${b.name}</b>
        <span style="flex:1"></span>
        <span>${isT?'⚡':'⚔️'}</span>
        <span style="font-size:10px;font-weight:600;color:${bonusColor}">+${b.bonus}</span>
        <span style="font-size:10px;color:var(--tx3)">${filled}/${b.slots}</span>
        <button class="btn btn-d" style="padding:0 4px;font-size:9px" onclick="clearOB('${b.id}')">🗑</button>
      </div>
      <div style="font-size:9px;color:var(--tx3)">${b.ru}</div>
    </div>
    ${slotsHtml}
  </div>`;
}

function defSlotsTable(b, pool) {
  let t = `<table style="font-size:10px"><thead><tr>
    <th style="width:14px">#</th>
    <th>Player</th>
    <th style="width:52px;text-align:right">Power</th>
  </tr></thead><tbody>`;
  for (let si = 0; si < b.slots; si++) {
    const sid = ourDef[b.id][si];
    const inf = slotInfo(sid);
    t += `<tr>
      <td style="color:var(--tx3)">${si+1}</td>
      <td><select onchange="ourDef['${b.id}'][${si}]=this.value||null;saveLS();renderAll()">
        <option value="">—</option>`;
    pool.forEach(s => {
      const info = slotInfo(s);
      if (!info) return;
      const dup = ourDef[b.id].some((x,xi) => x===s && xi!==si);
      t += `<option value="${s}"${sid===s?' selected':''}>${esc(info.playerName||'(unnamed)')}${dup?' ⚠':''}</option>`;
    });
    t += `</select></td>
      <td style="text-align:right;${inf?'font-weight:500':'color:var(--tx3)'}">
        ${inf ? inf.power+'K' : '—'}</td>
    </tr>`;
  }
  return t + `</tbody></table>`;
}

function renderOurDef() {
  let h = '';

  // TIER 1 — 4 buildings in a row
  const tlbl = (n, sub) => `<div class="tlbl" style="font-size:10px;color:var(--tx3);text-transform:uppercase;
    letter-spacing:.06em;font-weight:600;margin:14px 0 5px">
    Tier ${n} <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:var(--tx3)">${sub}</span>
  </div>`;

  h += tlbl(1, '— Barracks / Lighthouse / Mage Academy unlock Ghost Bridge');
  h += `<div class="bgrid-t1">`;
  BLDGS.filter(b => b.tier===1).forEach(b => {
    const pool = b.type==='titans' ? titanSlots() : heroSlots();
    const filled = ourDef[b.id].filter(x => x!==null).length;
    h += bldgCard(b, defSlotsTable(b, pool), filled);
  });
  h += `</div>`;

  // TIER 2 — 5 buildings in a row
  h += tlbl(2, '— unlocks after Bridge or Ghost Bridge');
  h += `<div class="bgrid-t2">`;
  BLDGS.filter(b => b.tier===2).forEach(b => {
    const pool = b.type==='titans' ? titanSlots() : heroSlots();
    const filled = ourDef[b.id].filter(x => x!==null).length;
    h += bldgCard(b, defSlotsTable(b, pool), filled);
  });
  h += `</div>`;

  // TIER 3 — Citadel full width, paired-row table (slots aligned)
  h += tlbl(3, '— unlocks after capturing any Bastion or Gates');
  BLDGS.filter(b => b.tier===3).forEach(b => {
    const pool = heroSlots();
    const filled = ourDef[b.id].filter(x => x!==null).length;
    const half = Math.ceil(b.slots / 2); // 4 rows for 7 slots

    const mkSelect = (si) => {
      const sid = ourDef[b.id][si];
      const inf = slotInfo(sid);
      let sel = `<select style="width:100%;font-size:10px;padding:1px 3px;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--tx)"
        onchange="ourDef['${b.id}'][${si}]=this.value||null;saveLS();renderAll()">
        <option value="">—</option>`;
      pool.forEach(s => {
        const info = slotInfo(s);
        if (!info) return;
        const dup = ourDef[b.id].some((x,xi) => x===s && xi!==si);
        sel += `<option value="${s}"${sid===s?' selected':''}>${esc(info.playerName||'(unnamed)')}${dup?' ⚠':''}</option>`;
      });
      sel += `</select>`;
      const pw = inf ? `<span style="font-size:10px;font-weight:500;white-space:nowrap">${inf.power}K</span>` : `<span style="font-size:10px;color:var(--tx3)">—</span>`;
      return {sel, pw};
    };

    // Build paired table: left col (slots 0..half-1), right col (slots half..slots-1)
    let t = `<table style="font-size:10px;width:100%;table-layout:fixed"><thead><tr>
      <th style="width:16px">#</th>
      <th>Player</th>
      <th style="width:44px;text-align:right">Power</th>
      <th style="width:10px;border:none;background:transparent"></th>
      <th style="width:16px">#</th>
      <th>Player</th>
      <th style="width:44px;text-align:right">Power</th>
    </tr></thead><tbody>`;
    for (let row = 0; row < half; row++) {
      const siL = row;
      const siR = row + half;
      const L = mkSelect(siL);
      const hasR = siR < b.slots;
      const R = hasR ? mkSelect(siR) : null;
      t += `<tr>
        <td style="color:var(--tx3)">${siL+1}</td>
        <td>${L.sel}</td>
        <td style="text-align:right">${L.pw}</td>
        <td style="border:none"></td>
        <td style="color:var(--tx3)">${hasR ? siR+1 : ''}</td>
        <td>${hasR ? R.sel : ''}</td>
        <td style="text-align:right">${hasR ? R.pw : ''}</td>
      </tr>`;
    }
    t += `</tbody></table>`;

    h += `<div class="card-citadel">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <b style="font-size:14px">${b.name}</b>
        <span style="font-size:10px;color:var(--tx3)">${b.ru}</span>
        <span style="flex:1"></span>
        <span>⚔️</span>
        <span style="font-size:13px;font-weight:700;color:var(--acc)">+${b.bonus}</span>
        <span style="font-size:10px;color:var(--tx3)">${filled}/${b.slots}</span>
        <button class="btn btn-d" style="padding:0 4px;font-size:9px" onclick="clearOB('${b.id}')">🗑</button>
      </div>
      ${t}
    </div>`;
  });

  document.getElementById('tabContent').innerHTML = h;
}
function clearOB(id) {
  ourDef[id] = Array(BLDGS.find(b=>b.id===id).slots).fill(null);
  renderAll();
}

// ═══════════════════════════════════════════════
// TAB 1 — ENEMY DEFENSE
// ═══════════════════════════════════════════════
function renderEnmDef() {
  let h = `<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">
    Enter enemy defenders. Tier 2/3 unlock chain is resolved automatically on calculation.
  </div>`;

  const tlbl = (n, sub) => `<div class="tlbl" style="font-size:10px;color:var(--tx3);text-transform:uppercase;
    letter-spacing:.06em;font-weight:600;margin:14px 0 5px">
    Tier ${n} <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:var(--tx3)">${sub}</span>
  </div>`;

  const enmSlotRows = (b) => {
    let t = `<table style="font-size:10px;width:100%"><thead><tr>
      <th style="width:14px">#</th><th>Name</th>
      <th style="width:58px;text-align:right">${b.type==='titans'?'⚡':'⚔️'} (K)</th>
    </tr></thead><tbody>`;
    for (let si = 0; si < b.slots; si++) {
      const s = enmDef[b.id][si];
      t += `<tr>
        <td style="color:var(--tx3)">${si+1}</td>
        <td><input type="text" id="en_${b.id}_${si}_n" value="${esc(s.name)}" placeholder="—"
          style="width:100%;font-size:10px;padding:1px 3px"
          onchange="enmDef['${b.id}'][${si}].name=this.value;saveLS();updateButtons()"
          onkeydown="enmNameEnter(event,'${b.id}',${si})"></td>
        <td><input type="text" inputmode="decimal" id="en_${b.id}_${si}_p" value="${s.power||0}"
          class="num" style="font-size:10px;padding:1px 4px;width:100%"
          onfocus="if(this.value==='0')this.value=''"
          onblur="if(!this.value||isNaN(+this.value))this.value='0'"
          onchange="enmDef['${b.id}'][${si}].power=parseFloat(this.value)||0;saveLS();updateButtons()"
          onkeydown="enmPowEnter(event,'${b.id}',${si})"></td>
      </tr>`;
    }
    return t + `</tbody></table>`;
  };

  const enmCard = (b) => {
    const isT = b.type==='titans';
    const bonusColor = b.bonus>=120?'var(--acc)':b.bonus>=60?'var(--warn)':'var(--tx2)';
    const filled = enmDef[b.id].filter(s=>s.power>0||s.name.trim()).length;
    return `<div class="card">
      <div style="margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:4px">
          <b style="font-size:12px">${b.name}</b>
          <span style="flex:1"></span>
          <span>${isT?'⚡':'⚔️'}</span>
          <span style="font-size:10px;font-weight:600;color:${bonusColor}">+${b.bonus}</span>
          <span style="font-size:10px;color:var(--tx3)">${filled}/${b.slots}</span>
          <button class="btn btn-d" style="padding:0 4px;font-size:9px" onclick="clearEB('${b.id}')">🗑</button>
        </div>
        <div style="font-size:9px;color:var(--tx3)">${b.ru}</div>
      </div>
      ${enmSlotRows(b)}
    </div>`;
  };

  // Tier 1
  h += tlbl(1, '— Barracks / Lighthouse / Mage Academy unlock Ghost Bridge');
  h += `<div class="bgrid-t1">`;
  BLDGS.filter(b=>b.tier===1).forEach(b => h += enmCard(b));
  h += `</div>`;

  // Tier 2
  h += tlbl(2, '— unlocks after Bridge or Ghost Bridge');
  h += `<div class="bgrid-t2">`;
  BLDGS.filter(b=>b.tier===2).forEach(b => h += enmCard(b));
  h += `</div>`;

  // Tier 3 — Citadel full width with paired-row table
  h += tlbl(3, '— unlocks after capturing any Bastion or Gates');
  BLDGS.filter(b=>b.tier===3).forEach(b => {
    const half = Math.ceil(b.slots/2);
    const filled = enmDef[b.id].filter(s=>s.power>0||s.name.trim()).length;

    const mkInputPair = (si) => {
      const s = enmDef[b.id][si];
      return {
        name: `<input type="text" id="en_${b.id}_${si}_n" value="${esc(s.name)}" placeholder="—"
          style="width:100%;font-size:10px;padding:1px 3px;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--tx)"
          onchange="enmDef['${b.id}'][${si}].name=this.value;saveLS();updateButtons()"
          onkeydown="enmNameEnter(event,'${b.id}',${si})">`,
        pow: `<input type="text" inputmode="decimal" id="en_${b.id}_${si}_p" value="${s.power||0}"
          style="width:100%;font-size:10px;padding:1px 4px;text-align:right;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--tx)"
          onfocus="if(this.value==='0')this.value=''"
          onblur="if(!this.value||isNaN(+this.value))this.value='0'"
          onchange="enmDef['${b.id}'][${si}].power=parseFloat(this.value)||0;saveLS();updateButtons()"
          onkeydown="enmPowEnter(event,'${b.id}',${si})">`
      };
    };

    let t = `<table style="font-size:10px;width:100%;table-layout:fixed"><thead><tr>
      <th style="width:16px">#</th><th>Name</th><th style="width:50px;text-align:right">(K)</th>
      <th style="width:10px;border:none;background:transparent"></th>
      <th style="width:16px">#</th><th>Name</th><th style="width:50px;text-align:right">(K)</th>
    </tr></thead><tbody>`;
    for (let row = 0; row < half; row++) {
      const siL = row, siR = row + half;
      const L = mkInputPair(siL);
      const hasR = siR < b.slots;
      const R = hasR ? mkInputPair(siR) : null;
      t += `<tr>
        <td style="color:var(--tx3)">${siL+1}</td>
        <td>${L.name}</td><td>${L.pow}</td>
        <td style="border:none"></td>
        <td style="color:var(--tx3)">${hasR?siR+1:''}</td>
        <td>${hasR?R.name:''}</td>
        <td>${hasR?R.pow:''}</td>
      </tr>`;
    }
    t += `</tbody></table>`;

    h += `<div class="card-citadel">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <b style="font-size:14px">${b.name}</b>
        <span style="font-size:10px;color:var(--tx3)">${b.ru}</span>
        <span style="flex:1"></span><span>⚔️</span>
        <span style="font-size:13px;font-weight:700;color:var(--acc)">+${b.bonus}</span>
        <span style="font-size:10px;color:var(--tx3)">${filled}/${b.slots}</span>
        <button class="btn btn-d" style="padding:0 4px;font-size:9px" onclick="clearEB('${b.id}')">🗑</button>
      </div>
      ${t}
    </div>`;
  });

  document.getElementById('tabContent').innerHTML = h;
}
function clearEB(id) {
  enmDef[id] = Array.from({length: BLDGS.find(b=>b.id===id).slots}, ()=>({name:'',power:0}));
  saveLS();
  renderTab(activeTab);
}

// ═══════════════════════════════════════════════
// TAB 2 — RESULTS
// ═══════════════════════════════════════════════
function runCalc() { calcAtk(); renderScore(); setTab(2); }

function renderResults() {
  if (!atkPlan) {
    document.getElementById('tabContent').innerHTML = `
      <div style="padding:30px;text-align:center;color:var(--tx3)">
        <div style="font-size:32px;margin-bottom:10px">📊</div>
        Open <b>Enemy Defense</b>, enter data, press <b>Calculate attack plan</b>.
      </div>`;
    return;
  }
  const sc = getScore();
  let h = '';

  // ── Summary ─────────────────────────────────
  const gambNote = sc.gambWins > 0 ? ` +${sc.gambWins}🎲` : '';
  h += `<div class="card" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
    <span style="font-size:13px;font-weight:600">Attack Plan</span>
    <span style="flex:1"></span>
    <span style="font-size:11px">Captures: <b style="color:var(--win)">${sc.caps}</b></span>
    <span style="font-size:11px">Wins: <b style="color:var(--win)">${sc.wins}${gambNote}</b> × ${fightPts} = <b>${sc.totalWins*fightPts}</b></span>
    <span style="font-size:11px">Bonus: <b style="color:var(--acc)">${sc.bonus}</b></span>
    <span style="font-size:15px;font-weight:700">Total: <b style="color:var(--win)">${sc.total}</b></span>
    <button class="btn" onclick="runCalc()">↻ Recalc</button>
  </div>`;

  // ── Legend ────────────────────────────────────
  h += `<div style="display:flex;gap:8px;font-size:10px;color:var(--tx2);margin-bottom:8px;flex-wrap:wrap">
    <span><span class="pill pw">WIN</span> Guaranteed</span>
    <span><span class="pill" style="background:var(--warnbg);color:var(--warn)">🎲 GAMBLE</span> E5 titan boost (may win)</span>
    <span><span class="pill pl">LOSE</span> Outmatched</span>
    <span>⚠️ Non-E5 titan — risky</span>
    <span>🚧 Risk player — 50/50</span>
  </div>`;

  // ── Player-centric table ─────────────────────
  h += `<div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px">Assignments by player</div>`;
  h += `<div class="card" style="padding:6px 10px;margin-bottom:10px">`;
  h += `<table style="font-size:11px"><thead><tr>
    <th style="width:20px">#</th>
    <th>Player</th>
    <th style="width:28px;text-align:center" title="Risk player">🚧</th>
    <th>Attack 1</th>
    <th>Attack 2</th>
    <th style="width:46px;text-align:right">Pts</th>
  </tr></thead><tbody>`;

  const ds2 = defSet();
  roster.forEach((p, idx) => {
    const atks = atkPlayerPlan?.[p.id] || [];
    const ptsEarned = atks.filter(a => a.result==='win'||a.result==='gamble').length * fightPts;
    const fmtAtk = (a) => {
      if (!a) return `<span style="color:var(--tx3)">—</span>`;
      const b = BLDGS.find(x=>x.id===a.bid);
      const icon = a.team==='h' ? '⚔️' : '⚡';
      const e5warn = a.team==='t' && !a.e5 ? '<span style="color:var(--lose)" title="Non-E5">⚠️</span>' : '';
      const def = enmDef[a.bid][a.si];
      const defName = def?.name ? esc(def.name) : `slot${a.si+1}`;
      if (a.result==='win') {
        return `<span style="color:var(--win)">${icon}${e5warn} ${b.ru}<br>
          <span style="font-size:9px;color:var(--tx2)">${a.myPow}K &gt; ${a.defPow}K · ${defName}</span>
        </span>`;
      } else if (a.result==='gamble') {
        return `<span style="color:var(--warn)">${icon}${e5warn} ${b.ru} 🎲<br>
          <span style="font-size:9px;color:var(--tx2)">${a.myPow}K* &gt; ${a.defPow}K · ${defName}</span>
        </span>`;
      }
      return `<span style="color:var(--lose)">${icon} ${b.ru}<br>
        <span style="font-size:9px">${a.myPow}K vs ${a.defPow}K</span>
      </span>`;
    };
    const riskMark = p.risk ? '🚧' : '';
    const rowBg = p.risk ? 'background:var(--warnbg)' : atks.length===0 ? 'opacity:.5' : '';
    h += `<tr${rowBg?` style="${rowBg}"`:''}>
      <td style="color:var(--tx3)">${idx+1}</td>
      <td style="font-weight:${atks.length?'500':'400'}">${esc(p.name||'?')}</td>
      <td style="text-align:center">${riskMark}</td>
      <td style="padding:3px 4px;line-height:1.4">${fmtAtk(atks[0])}</td>
      <td style="padding:3px 4px;line-height:1.4">${fmtAtk(atks[1])}</td>
      <td style="text-align:right;font-weight:600;color:${ptsEarned?'var(--win)':'var(--tx3)'}">${ptsEarned||'—'}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;

  // ── Building-centric view ─────────────────────
  h += `<div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px">Assignments by building</div>`;
  [1,2,3].forEach(tier => {
    const gridCls = tier===1?'bgrid-t1':tier===2?'bgrid-t2':'bgrid-t3';
    h += `<div class="tlbl" style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin:10px 0 4px">Tier ${tier}</div>`;
    h += `<div class="${gridCls}">`;
    BLDGS.filter(b => b.tier===tier).forEach(b => {
      const p     = atkPlan[b.id];
      const cap   = p?.captured, locked = p?.locked;
      const wins  = p?.slots.filter(s => s.result==='win'||s.result==='gamble').length || 0;
      const defs  = enmDef[b.id].map((s,i)=>({...s,i})).filter(s=>s.power>0||s.name.trim());
      const total = defs.length;
      const bonusColor = b.bonus>=120?'var(--acc)':b.bonus>=60?'var(--warn)':'var(--tx2)';
      let cc = 'card';
      if (!locked) {
        if (cap) cc += ' cap';
        else if (wins>0&&wins<total) cc += ' part';
        else if (total>0&&wins===0) cc += ' fail';
      }
      h += `<div class="${cc}" style="${locked?'opacity:.4':''}">`;
      h += `<div style="margin-bottom:5px">
        <div style="display:flex;align-items:center;gap:4px">
          <b style="font-size:12px">${b.ru}</b>
          <span style="flex:1"></span>
          <span style="font-size:10px;font-weight:600;color:${bonusColor}">+${b.bonus}</span>`;
      if (locked) h += `<span style="font-size:9px;color:#888">🔒</span>`;
      else if (cap) h += `<span class="tag" style="font-size:9px">🏴 cap</span>`;
      else if (wins>0) h += `<span style="font-size:9px;color:var(--warn)">${wins}/${total}</span>`;
      else if (total>0) h += `<span style="font-size:9px;color:var(--lose)">0/${total}</span>`;
      h += `</div><div style="font-size:9px;color:var(--tx3)">${b.name}</div></div>`;
      if (!locked && defs.length) {
        h += `<table style="font-size:10px"><thead><tr>
          <th style="width:14px">#</th><th>Enemy</th>
          <th style="width:46px;text-align:right">Def</th>
          <th>Attacker</th>
          <th style="width:38px;text-align:center">Result</th>
        </tr></thead><tbody>`;
        defs.forEach((def) => {
          const slot = p?.slots.find(s => s.defIdx===def.i);
          const pl   = slot?.pid ? roster.find(r=>r.id===slot.pid) : null;
          const res  = slot?.result || 'none';
          const isGamble = res==='gamble';
          const rb = res==='win'?'var(--winbg)':isGamble?'var(--warnbg)':'';
          const e5w = slot?.team==='t' && pl && pl.e5===false ? '⚠️' : '';
          const riskW = pl?.risk ? '🚧' : '';
          h += `<tr${rb?` style="background:${rb}"`:''}>
            <td style="color:var(--tx3)">${def.i+1}</td>
            <td style="font-size:10px">${esc(def.name||'—')}</td>
            <td style="text-align:right">${def.power?def.power+'K':'—'}</td>
            <td style="${pl?'font-weight:500':'color:var(--tx3)'}font-size:10px">
              ${pl?esc(pl.name||'?')+e5w+riskW:'—'}</td>
            <td style="text-align:center">
              ${res==='win'?'<span class="pill pw">WIN</span>'
                :res==='gamble'?'<span class="pill" style="background:var(--warnbg);color:var(--warn)">🎲</span>'
                :'<span class="pill pe">—</span>'}
            </td>
          </tr>`;
        });
        h += `</tbody></table>`;
      } else if (!locked) {
        h += `<div style="font-size:10px;color:var(--tx3)">No defenders entered.</div>`;
      }
      h += `</div>`;
    });
    h += `</div>`;
  });

  // ── Unassigned / leftover ─────────────────────
  const usedPids = new Set();
  BLDGS.forEach(b => atkPlan[b.id]?.slots.forEach(s => { if(s.pid) usedPids.add(s.pid); }));
  const freeAtk = roster.filter(p => {
    const fH = !ds2.has('h_'+p.id) && p.hPow>0;
    const fT = !ds2.has('t_'+p.id) && p.tPow>0;
    return (fH||fT) && !usedPids.has(p.id);
  });
  if (freeAtk.length) {
    h += `<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--tx2)">No assignments (${freeAtk.length})</div>`;
    h += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;
    freeAtk.forEach(p => {
      const fH = !ds2.has('h_'+p.id) && p.hPow>0;
      const fT = !ds2.has('t_'+p.id) && p.tPow>0;
      h += `<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--bg2);border:1px solid var(--bd)">
        ${fH?`⚔️${p.hPow}K`:''} ${fT?`⚡${p.tPow}K`:''} ${esc(p.name||'?')}${p.risk?' 🚧':''}
      </span>`;
    });
    h += `</div>`;
  }

  // ── Copy-paste ────────────────────────────────
  h += `<div style="margin-top:12px;font-size:11px;font-weight:600;color:var(--tx2)">Copy-paste</div>`;
  h += `<div class="cbox">${buildSummary()}</div>`;
  document.getElementById('tabContent').innerHTML = h;
}

function buildSummary() {
  if (!atkPlan || !atkPlayerPlan) return '(no plan)';
  const sc = getScore();
  const lines = [`Attack Plan — est. ${sc.total} pts (${sc.totalWins}×${fightPts} + ${sc.bonus} bonus)`, ''];
  lines.push('BY PLAYER:');
  roster.forEach(p => {
    const atks = atkPlayerPlan[p.id] || [];
    if (!atks.length) return;
    const fmtA = a => {
      const b = BLDGS.find(x=>x.id===a.bid);
      const def = enmDef[a.bid][a.si];
      const defName = def?.name || `slot${a.si+1}`;
      const flag = a.result==='gamble'?' 🎲':'';
      const e5w = a.team==='t' && !a.e5 ? ' ⚠️non-E5' : '';
      return `${b.ru}(${a.team==='h'?'⚔️':'⚡'}) ${a.myPow}K>${a.defPow}K ${defName}${flag}${e5w} → ${a.result.toUpperCase()}`;
    };
    const risk = p.risk ? ' 🚧50%' : '';
    lines.push(`  ${p.name}${risk}: ${atks.map(fmtA).join(' | ')}`);
  });
  lines.push('');
  lines.push('BY BUILDING:');
  BLDGS.forEach(b => {
    const p = atkPlan[b.id];
    if (!p || p.locked) return;
    const defs = enmDef[b.id].filter(s => s.power>0||s.name.trim());
    if (!defs.length) return;
    lines.push(`${b.name}${p.captured?' 🏴':''}:`);
    defs.forEach((def, row) => {
      const slot = p.slots.find(s => s.defIdx===row);
      const pl   = slot?.pid ? roster.find(r=>r.id===slot.pid) : null;
      const res  = slot?.result || '---';
      lines.push(`  ${row+1}. ${pl?pl.name:'nobody'} vs ${def.name||'?'}(${def.power}K) → ${res.toUpperCase()}`);
    });
  });
  return lines.join('\n');
}

// ═══════════════════════════════════════════════
// MIGRATION: old saves store raw power, new stores K
// If any player has power > 9999, assume it's raw → divide by 1000
// ═══════════════════════════════════════════════
function migrateRoster(r) {
  if (!r || !r.length) return r;
  const needsMigration = r.some(p => (p.hPow > 9999) || (p.tPow > 9999));
  if (!needsMigration) return r;
  return r.map(p => ({
    ...p,
    hPow: p.hPow > 9999 ? Math.round(p.hPow / 1000 * 10) / 10 : p.hPow,
    tPow: p.tPow > 9999 ? Math.round(p.tPow / 1000 * 10) / 10 : p.tPow,
  }));
}

// ═══════════════════════════════════════════════
// EXPORT / IMPORT / RESET
// ═══════════════════════════════════════════════
function doExport() {
  const data = {v:4, roster, ourDef, enmDef, ghostBridge, fightPts, nextId};
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data,null,2));
  a.download = 'gw_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function doImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = function(ev) {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.roster) roster = d.roster.map(p => ({
        ...p,
        hPow: normPow(p.hPow),
        tPow: normPow(p.tPow),
        e5: p.e5 !== undefined ? p.e5 : true,
        risk: p.risk || false,
      }));
      if (d.nextId) nextId = d.nextId;
      if (d.ourDef) BLDGS.forEach(b => { if(d.ourDef[b.id]) ourDef[b.id] = d.ourDef[b.id]; });
      if (d.enmDef) BLDGS.forEach(b => { if(d.enmDef[b.id]) enmDef[b.id] = d.enmDef[b.id]; });
      if (d.fightPts) {
        fightPts = d.fightPts;
        document.getElementById('fptInp').value = fightPts;
      }
      atkPlan = null;
      renderAll();
      alert('✓ Loaded!');
    } catch(err) { alert('Error: ' + err.message); }
  };
  r.readAsText(file); e.target.value = '';
}
function resetWar() {
  if (!confirm('Clear defense and attack plan? Roster is kept.')) return;
  BLDGS.forEach(b => {
    ourDef[b.id] = Array(b.slots).fill(null);
    enmDef[b.id] = Array.from({length:b.slots}, ()=>({name:'',power:0}));
  });
  atkPlan = null;
  renderAll();
}

// ═══════════════════════════════════════════════
// LOCALSTORAGE
// ═══════════════════════════════════════════════
const LS = 'gwp_v4';
function saveLS() {
  try { localStorage.setItem(LS, JSON.stringify({v:4,roster,ourDef,enmDef,ghostBridge,fightPts,titanBoost,titanPenalty,nextId})); } catch(e) {}
}
function loadLS() {
  try {
    const raw = localStorage.getItem(LS); if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.roster) roster = d.roster.map(p => ({
      ...p,
      hPow: normPow(p.hPow),
      tPow: normPow(p.tPow),
      e5: p.e5 !== undefined ? p.e5 : true,
      risk: p.risk || false,
    }));
    if (d.nextId) nextId = d.nextId;
    if (d.ourDef) BLDGS.forEach(b => { if(d.ourDef[b.id]) ourDef[b.id] = d.ourDef[b.id]; });
    if (d.enmDef) BLDGS.forEach(b => { if(d.enmDef[b.id]) enmDef[b.id] = d.enmDef[b.id]; });
    if (d.fightPts) {
      fightPts = d.fightPts;
      const el = document.getElementById('fptInp'); if (el) el.value = fightPts;
    }
    if (d.titanBoost !== undefined) {
      titanBoost = d.titanBoost;
      const el = document.getElementById('boostInp'); if (el) el.value = titanBoost;
    }
    if (d.titanPenalty !== undefined) {
      titanPenalty = d.titanPenalty;
      const el = document.getElementById('penaltyInp'); if (el) el.value = titanPenalty;
    }
    return true;
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function updateButtons() {
  const hasPlayers = roster.length > 0;
  const hasEnemy   = BLDGS.some(b => enmDef[b.id].some(s => s.power > 0 || s.name.trim()));
  const db = document.getElementById('defBtn');
  const ab = document.getElementById('atkBtn');
  if (db) db.disabled = !hasPlayers;
  if (ab) ab.disabled = !hasEnemy;
}

function renderAll() { renderScore(); renderRoster(); renderTab(activeTab); updateButtons(); saveLS(); }

const _ok = loadLS();
renderAll();
if (_ok) {
  const ind = document.createElement('div');
  ind.style.cssText = 'position:fixed;bottom:12px;right:12px;background:var(--winbg);color:var(--win);font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--win);z-index:99;pointer-events:none';
  ind.textContent = '✓ Data restored';
  document.body.appendChild(ind);
  setTimeout(() => ind.remove(), 2500);
}
</script>
